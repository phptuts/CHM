<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LED Brightness Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            text-align: center;
        }

        input[type="range"] {
            width: 100%;
        }

        .value {
            font-size: 2rem;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>LED Brightness</h1>

    <button id="connect">Connect Arduino</button>

    <div class="value" id="value">128</div>

    <input
        id="slider"
        type="range"
        min="0"
        max="255"
        value="128"
    />

    <script>
        let port;
        let writer;

        const slider = document.getElementById('slider');
        const valueLabel = document.getElementById('value');

        document.getElementById('connect').addEventListener('click', async () => {
            try {
                port = await navigator.serial.requestPort();

                await port.open({
                    baudRate: 115200
                });

                writer = port.writable.getWriter();

                console.log('Connected');
            } catch (err) {
                console.error(err);
            }
        });

        slider.addEventListener('input', async () => {
            const value = slider.value;

            valueLabel.textContent = value;
            console.log('Slider value:', value);
            if (!writer) return;
            console.log('Sending value to Arduino:', value);
            try {
                await writer.write(
                    new TextEncoder().encode(value + '|')
                );
            } catch (err) {
                console.error(err);
            }
        });
    </script>

</body>
</html>
